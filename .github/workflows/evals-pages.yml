name: Eval Leaderboard Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/evals-pages.yml"
      - "evals/leaderboard.py"
      - "evals/leaderboard/runs.jsonl"
      - "uv.lock"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Render leaderboard site
        run: |
          mkdir -p _site
          uv run python -m evals.leaderboard render-html --html-path _site/index.html
          cp evals/leaderboard.md _site/leaderboard.md
          cp evals/leaderboard/runs.jsonl _site/runs.jsonl
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
